name: Bug 报告
description: 提交可复现的功能错误、界面异常或兼容问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请提供最小复现信息，并删除密钥、Cookie、私人模型和本机敏感路径。
  - type: input
    id: bridge_version
    attributes:
      label: Bridge 版本
      placeholder: 例如 v0.4.28 或 main + commit SHA
    validations:
      required: true
  - type: input
    id: comfy_version
    attributes:
      label: ComfyUI 版本
      placeholder: 版本号或 commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 系统与浏览器
      placeholder: 例如 Windows 11 / Chrome 140 / ComfyUI 便携包
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      options:
        - 主 Bridge 节点
        - 正向/反向提示词小节点
        - 图片输入或图片 Prompt 读取
        - 模型、UNET、LoRA 或 VAE
        - 收藏、词库或翻译
        - 布局、拖放或快捷键
        - 安装、WebUI 接入或数据下载
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
      placeholder: |
        1. 添加……节点
        2. 输入……
        3. 点击……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志、截图或最小工作流
      description: 可拖入附件；请先移除密钥、私人路径和无关节点。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue 和 PR，没有找到相同问题。
          required: true
        - label: 我已使用最新版复现，或已说明无法升级的原因。
          required: true
        - label: 附件和日志中不包含密钥、Cookie 或其他敏感信息。
          required: true
